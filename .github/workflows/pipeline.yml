name: NetDevOps Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pyats-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Automation Frameworks
      run: |
        python -m pip install --upgrade pip
        pip install pyats genie requests

    - name: Execute pyATS Network Verification
      run: |
        python pyats/verify_srl.py

# Triggering build run
